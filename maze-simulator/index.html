<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>미로 찾기 — BFS 최단거리 시뮬레이터</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@latest/dist/web/static/pretendard.min.css">
<style>
  :root{
    --bg:#e7ebef; --panel:#fff; --panel-2:#f4f6f9; --ink:#16202e; --ink-soft:#2b3a4f;
    --muted:#6b7788; --line:#dde3ea; --line-2:#c9d2dc; --blue:#2f6fb0; --gold:#c99a2e; --green:#2e9e6b;
    --font:"Pretendard",-apple-system,sans-serif;
  }
  *{ box-sizing:border-box; }
  body{ margin:0; min-height:100vh; background:radial-gradient(1200px 500px at 15% -10%,#eef1f5,transparent 60%),var(--bg);
    color:var(--ink); font-family:var(--font); line-height:1.5; padding:24px 16px 48px; }
  .wrap{ max-width:900px; margin:0 auto; }
  h1{ font-size:22px; font-weight:700; margin-bottom:3px; }
  .sub{ font-size:14px; color:var(--muted); margin-bottom:20px; }

  .controls{ display:flex; align-items:center; gap:10px; flex-wrap:wrap; background:var(--panel);
    border:1px solid var(--line); border-radius:14px; padding:12px 16px; margin-bottom:18px; }
  .btn{ min-height:40px; padding:0 16px; border:1px solid var(--line-2); border-radius:11px; background:#fff;
    color:var(--ink-soft); font-weight:600; font-size:14px; cursor:pointer; transition:.15s; }
  .btn:hover:not(:disabled){ border-color:var(--ink); background:#fbfcfd; transform:translateY(-1px); }
  .btn:disabled{ opacity:.4; cursor:not-allowed; }
  .btn.primary{ background:var(--ink); border-color:var(--ink); color:#fff; }
  .btn.primary:hover{ background:#0d1520; }
  .speed{ display:flex; align-items:center; gap:8px; font-size:13px; color:var(--muted); margin-left:auto; }
  input[type=range]{ -webkit-appearance:none; appearance:none; width:130px; height:6px; border-radius:999px; background:#dfe3e8; outline:none; cursor:pointer; }
  input[type=range]::-webkit-slider-thumb{ -webkit-appearance:none; appearance:none; width:18px; height:18px; border-radius:50%; background:var(--blue); border:3px solid #fff; box-shadow:0 1px 4px rgba(0,0,0,.25); transition:transform .12s; }
  input[type=range]::-webkit-slider-thumb:hover{ transform:scale(1.15); }
  input[type=range]::-moz-range-thumb{ width:18px; height:18px; border-radius:50%; background:var(--blue); border:3px solid #fff; cursor:pointer; }

  .stage{ display:grid; grid-template-columns:minmax(260px,1fr) minmax(240px,320px); gap:20px; align-items:start; }
  @media (max-width:720px){ .stage{ grid-template-columns:1fr; } }

  .card{ background:var(--panel); border:1px solid var(--line); border-radius:14px; padding:16px; }
  .card h2{ margin:0 0 12px; font-size:15px; font-weight:700; }

  .maze{ display:grid; gap:4px; width:fit-content; margin:0 auto; }
  .cell{ width:52px; height:52px; border-radius:8px; display:grid; place-items:center; position:relative;
    font-size:19px; font-weight:700; color:var(--ink); background:#eef1f4; transition:background .15s, box-shadow .15s; }
  .cell.wall{ background:#2b3442; }
  .cell.start{ background:var(--green); color:#fff; }
  .cell.goal{ background:var(--green); color:#fff; }
  .cell.visited{ background:#dce8f6; color:#1d3a5f; }
  .cell.frontier{ box-shadow:inset 0 0 0 3px var(--blue); }
  .cell.current{ box-shadow:inset 0 0 0 4px var(--ink); }
  .cell .tag{ position:absolute; top:3px; left:5px; font-size:10px; font-weight:700; opacity:.7; }
  .cell .coord{ position:absolute; top:3px; left:5px; font-size:11px; font-weight:700; color:rgba(22,32,46,.5); }
  .cell.wall .coord{ color:rgba(255,255,255,.45); }
  .cell.start .coord{ color:rgba(255,255,255,.85); }
  .cell.visited .coord{ color:rgba(29,58,95,.6); }
  .cell.goal .coord{ color:rgba(255,255,255,.85); }
  .cell .main{ font-size:19px; font-weight:700; }

  .queue-box{ display:flex; flex-direction:column; gap:12px; }
  .queue{ display:flex; gap:6px; flex-wrap:wrap; min-height:40px; background:var(--panel-2);
    border:1px solid var(--line); border-radius:10px; padding:10px; align-content:flex-start; }
  .chip{ font-size:12px; font-weight:600; font-variant-numeric:tabular-nums; padding:5px 9px; border-radius:7px; background:#fff; border:1px solid var(--line-2); color:var(--ink-soft); }
  .chip.front{ background:var(--blue); border-color:var(--blue); color:#fff; }
  .qmeta{ font-size:12px; color:var(--muted); }
  .step-msg{ min-height:52px; padding:12px 14px; border:1px solid var(--line); border-radius:10px; background:#fff; font-size:14px; font-weight:600; color:var(--ink); }
  .answer{ padding:12px 14px; border-radius:10px; font-size:14px; font-weight:700; }
  .answer.on{ background:#fdf5e3; border:1px solid #ecd9a6; color:#7a5b12; }
  .answer.off{ background:var(--panel-2); border:1px solid var(--line); color:var(--muted); }

  .legend{ display:flex; flex-wrap:wrap; justify-content:center; gap:8px 16px; margin-top:14px; }
  .li{ display:flex; align-items:center; gap:6px; font-size:12px; color:var(--ink-soft); }
  .sw{ width:14px; height:14px; border-radius:4px; }
</style>
</head>
<body>
<div class="wrap">
  <h1>미로 찾기 — BFS 최단거리</h1>
  <p class="sub">S에서 출발해 큐로 한 층씩 퍼져나가며 각 칸까지의 거리를 기록</p>

  <div class="controls">
    <button class="btn primary" id="play">▶ 재생</button>
    <button class="btn" id="step">한 단계</button>
    <button class="btn" id="reset">처음으로</button>
    <div class="speed">속도 <input type="range" id="speed" min="1" max="10" value="5"></div>
  </div>

  <div class="stage">
    <div class="card">
      <h2>미로</h2>
      <div class="maze" id="maze"></div>
      <div class="legend">
        <div class="li"><span class="sw" style="background:var(--green)"></span>출발(S) / 도착(G)</div>
        <div class="li"><span class="sw" style="background:#2b3442"></span>벽 #</div>
        <div class="li"><span class="sw" style="box-shadow:inset 0 0 0 3px var(--blue)"></span>큐에 저장된 위치</div>
        <div class="li"><span class="sw" style="box-shadow:inset 0 0 0 3px var(--ink)"></span>현재 탐색 중인 위치</div>
      </div>
    </div>

    <div class="card">
      <h2>큐 (Queue)</h2>
      <div class="queue-box">
        <div class="queue" id="queue"></div>
        <div class="qmeta" id="qmeta">큐 크기 0</div>
        <div class="step-msg" id="msg">시작 칸 S를 큐에 넣고 시작</div>
        <div class="answer off" id="answer">G까지 거리: 탐색 중…</div>
      </div>
    </div>
  </div>
</div>

<script>
const MAP = ["#S###","#...#","#.#.#","#....","###G#"].map(r=>r.split(""));
const R=MAP.length, C=MAP[0].length;
const dx=[1,0,-1,0], dy=[0,1,0,-1];
let start,goal;
for(let r=0;r<R;r++)for(let c=0;c<C;c++){ if(MAP[r][c]==='S')start=[r,c]; if(MAP[r][c]==='G')goal=[r,c]; }

function simulate(){
  const dist=Array.from({length:R},()=>Array(C).fill(-1));
  const q=[start]; dist[start[0]][start[1]]=0;
  const steps=[]; let answer=null;
  // 초기 스냅샷
  steps.push({ dist:dist.map(r=>r.slice()), queue:q.slice(), current:null, answer, msg:`시작 칸 S(${start[0]},${start[1]})를 큐에 넣고 거리 0으로 기록` });
  while(q.length){
    const [r,c]=q.shift();
    const added=[];
    for(let i=0;i<4;i++){
      const nr=r+dx[i], nc=c+dy[i];
      if(nr<0||nr>=R||nc<0||nc>=C) continue;
      if(MAP[nr][nc]==='#') continue;
      if(dist[nr][nc]!==-1) continue;
      dist[nr][nc]=dist[r][c]+1; q.push([nr,nc]); added.push([nr,nc]);
      if(MAP[nr][nc]==='G' && answer===null) answer=dist[nr][nc];
    }
    steps.push({ dist:dist.map(r=>r.slice()), queue:q.slice(), current:[r,c], answer,
      msg:`(${r},${c}) 꺼냄 → 이동 가능한 ${added.length}칸에 거리 ${dist[r][c]+1} 기록 후 큐에 추가` });
  }
  steps.push({ dist:dist.map(r=>r.slice()), queue:[], current:null, answer, done:true,
    msg: answer!==null?`G 도착! 최단거리 ${answer}`:`G에 도달 불가 → -1` });
  return steps;
}

let steps=simulate(), cur=0, playing=false, timer=null;

function color(d,maxD){ const f=maxD<=0?0:d/maxD; const hue=210+f*140; return `hsl(${hue},68%,52%)`; }

function render(){
  const s=steps[cur];
  const maxD=Math.max(...s.dist.flat());
  const maze=document.getElementById('maze');
  maze.style.gridTemplateColumns=`repeat(${C},52px)`;
  maze.innerHTML='';
  const inQueue=new Set(s.queue.map(([r,c])=>r*C+c));
  for(let r=0;r<R;r++)for(let c=0;c<C;c++){
    const ch=MAP[r][c]; const d=s.dist[r][c];
    const cell=document.createElement('div'); cell.className='cell';
    let main='';
    if(ch==='#'){ cell.classList.add('wall'); }
    else if(ch==='S'){ cell.classList.add('start'); main='S'; }
    else if(ch==='G'){ cell.classList.add('goal'); main = d>=0 ? d : 'G'; }
    else if(d>=0){ cell.classList.add('visited'); main=d; }
    cell.innerHTML=`<span class="coord">${r},${c}</span>`+(main!==''?`<span class="main">${main}</span>`:'');
    if(inQueue.has(r*C+c)) cell.classList.add('frontier');
    if(s.current && s.current[0]===r && s.current[1]===c) cell.classList.add('current');
    maze.appendChild(cell);
  }
  const queue=document.getElementById('queue'); queue.innerHTML='';
  s.queue.forEach(([r,c],i)=>{ const chip=document.createElement('div');
    chip.className='chip'+(i===0?' front':''); chip.textContent=`${r},${c}`; queue.appendChild(chip); });
  document.getElementById('qmeta').textContent=`큐 크기 ${s.queue.length}`;
  document.getElementById('msg').textContent=s.msg;
  const ans=document.getElementById('answer');
  if(s.answer!==null){ ans.className='answer on'; ans.textContent=`G까지 최단거리: ${s.answer}`; }
  else if(s.done){ ans.className='answer off'; ans.textContent='도달 불가 → -1'; }
  else { ans.className='answer off'; ans.textContent='G까지 거리: 탐색 중…'; }
  document.getElementById('step').disabled = cur>=steps.length-1;
}

function stepOnce(){ if(cur<steps.length-1){ cur++; render(); return true; } return false; }
function play(){ if(playing){ stop(); return; } playing=true;
  document.getElementById('play').textContent='⏸ 일시정지';
  const delay=720-document.getElementById('speed').value*62;
  timer=setInterval(()=>{ if(!stepOnce()) stop(); },delay); }
function stop(){ playing=false; document.getElementById('play').textContent='▶ 재생'; if(timer){ clearInterval(timer); timer=null; } }

document.getElementById('play').addEventListener('click',play);
document.getElementById('step').addEventListener('click',()=>{ stop(); stepOnce(); });
document.getElementById('reset').addEventListener('click',()=>{ stop(); cur=0; render(); });
document.getElementById('speed').addEventListener('input',()=>{ if(playing){ stop(); play(); } });
render();
</script>
</body>
</html>
