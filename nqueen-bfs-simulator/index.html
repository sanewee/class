<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>n-queen 백트래킹 시뮬레이터</title>
  <style>
    :root {
      --bg: #eef1f5;
      --panel: #ffffff;
      --panel-2: #f8fafc;
      --ink: #182230;
      --muted: #667085;
      --line: #d0d7e2;
      --line-dark: #344054;
      --primary: #0f766e;
      --primary-soft: #d9f3ef;
      --blue: #2563eb;
      --green-cell: #78c28b;
      --red-cell: #ec6f8f;
      --amber: #b45309;
      --amber-soft: #fff2cc;
      --white-cell: #ffffff;
      --gray-cell: #d9dde3;
      --shadow: 0 18px 46px rgba(24, 34, 48, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--ink);
      font-family: Arial, "Noto Sans KR", sans-serif;
      line-height: 1.45;
    }

    button {
      font: inherit;
    }

    main {
      width: min(1320px, 100%);
      margin: 0 auto;
      padding: clamp(14px, 2.4vw, 30px);
    }

    .shell {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .toolbar {
      display: grid;
      grid-template-columns: minmax(220px, auto) 1fr auto;
      gap: 14px;
      align-items: center;
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
      background: #fbfcff;
    }

    .tool-group {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .label {
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }

    .n-picker {
      display: grid;
      grid-template-columns: repeat(7, 36px);
      gap: 4px;
      padding: 4px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #ffffff;
    }

    .n-btn {
      width: 36px;
      height: 34px;
      border: 0;
      border-radius: 6px;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      font-weight: 700;
    }

    .n-btn.active {
      background: var(--ink);
      color: white;
    }

    .btn {
      min-height: 38px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: white;
      color: var(--ink);
      padding: 8px 12px;
      cursor: pointer;
      white-space: nowrap;
    }

    .btn:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .btn.primary {
      background: var(--primary);
      border-color: var(--primary);
      color: white;
    }

    .btn.warn {
      background: var(--amber-soft);
      border-color: #f5c66d;
      color: #7c3e00;
    }

    .stage {
      display: grid;
      grid-template-columns: minmax(330px, 610px) minmax(320px, 1fr);
      gap: 18px;
      padding: 18px;
      align-items: start;
    }

    .board-card {
      display: grid;
      justify-items: center;
      gap: 12px;
    }

    .board {
      --n: 4;
      display: grid;
      grid-template-columns: repeat(var(--n), minmax(0, 1fr));
      grid-template-rows: repeat(var(--n), minmax(0, 1fr));
      width: min(100%, 610px);
      aspect-ratio: 1 / 1;
      border: 2px solid var(--line-dark);
      background: white;
      overflow: hidden;
    }

    .cell {
      position: relative;
      display: grid;
      place-items: center;
      min-width: 0;
      min-height: 0;
      aspect-ratio: 1 / 1;
      border: 1px solid rgba(24, 34, 48, 0.13);
      color: #0f172a;
      font-size: clamp(20px, 4.6vw, 46px);
      font-weight: 800;
      transition: background-color 160ms ease, outline-color 160ms ease, transform 160ms ease;
    }

    .cell.light {
      background: var(--white-cell);
    }

    .cell.dark {
      background: var(--gray-cell);
    }

    .cell.queen {
      background: var(--green-cell);
      color: #073b1f;
    }

    .cell.trying {
      outline: 4px solid var(--blue);
      outline-offset: -4px;
      z-index: 1;
    }

    .cell.reject {
      background: var(--red-cell);
      outline: 4px solid #be123c;
      outline-offset: -4px;
      z-index: 1;
    }

    .cell.backtracking {
      background: var(--amber-soft);
      color: #7c3e00;
      animation: backtrackPulse 760ms ease-in-out infinite;
      z-index: 2;
    }

    .cell.solution {
      animation: solutionGlow 900ms ease-in-out infinite alternate;
    }

    .cell small {
      position: absolute;
      left: 5px;
      top: 3px;
      color: rgba(31, 41, 55, 0.52);
      font-size: 11px;
      font-weight: 400;
    }

    @keyframes backtrackPulse {
      0% {
        box-shadow: inset 0 0 0 0 rgba(180, 83, 9, 0.10), 0 0 0 0 rgba(180, 83, 9, 0.36);
        transform: scale(1);
      }
      50% {
        box-shadow: inset 0 0 0 999px rgba(180, 83, 9, 0.16), 0 0 0 8px rgba(180, 83, 9, 0.14);
        transform: scale(0.92);
      }
      100% {
        box-shadow: inset 0 0 0 0 rgba(180, 83, 9, 0.10), 0 0 0 0 rgba(180, 83, 9, 0);
        transform: scale(1);
      }
    }

    @keyframes solutionGlow {
      from {
        box-shadow: inset 0 0 0 0 rgba(21, 128, 61, 0.10);
      }
      to {
        box-shadow: inset 0 0 0 999px rgba(21, 128, 61, 0.12);
      }
    }

    .legend {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 8px;
      color: var(--muted);
      font-size: 13px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 8px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      word-break: keep-all;
    }

    .swatch {
      width: 18px;
      height: 18px;
      border: 1px solid rgba(17, 24, 39, 0.18);
      border-radius: 4px;
      flex: 0 0 auto;
    }

    .white { background: var(--white-cell); }
    .gray { background: var(--gray-cell); }
    .green { background: var(--green-cell); }
    .red { background: var(--red-cell); }

    .side {
      display: grid;
      gap: 12px;
    }

    .message {
      min-height: 58px;
      display: flex;
      align-items: center;
      border-left: 4px solid var(--primary);
      border-radius: 0 8px 8px 0;
      background: #f3fbf9;
      padding: 12px;
      word-break: keep-all;
    }

    .metrics {
      display: grid;
      grid-template-columns: repeat(4, minmax(80px, 1fr));
      gap: 8px;
    }

    .metric {
      min-height: 70px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel-2);
      padding: 10px;
    }

    .metric span {
      display: block;
      color: var(--muted);
      font-size: 12px;
    }

    .metric strong {
      display: block;
      margin-top: 4px;
      font-size: 22px;
    }

    .array-grid {
      display: grid;
      gap: 10px;
    }

    .array-row {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: white;
      overflow: hidden;
    }

    .array-title {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      padding: 9px 10px;
      background: var(--panel-2);
      border-bottom: 1px solid var(--line);
      color: var(--muted);
      font-size: 13px;
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      padding: 10px;
    }

    .chip {
      display: inline-grid;
      place-items: center;
      min-width: 30px;
      height: 30px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: white;
      color: var(--muted);
      font-size: 12px;
    }

    .chip.on {
      background: var(--primary-soft);
      border-color: #8bd8cd;
      color: #064e3b;
      font-weight: 700;
    }

    .formula {
      display: grid;
      gap: 8px;
    }

    .formula div,
    .diagonal-note {
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel-2);
      word-break: keep-all;
    }

    .diagonal-note {
      background: white;
      color: var(--muted);
      font-size: 14px;
    }

    @media (max-width: 980px) {
      .toolbar,
      .stage {
        grid-template-columns: 1fr;
      }

      .toolbar {
        align-items: stretch;
      }

      .metrics {
        grid-template-columns: repeat(2, minmax(120px, 1fr));
      }
    }

    @media (max-width: 560px) {
      main {
        padding: 10px;
      }

      .stage {
        padding: 12px;
      }

      .n-picker {
        grid-template-columns: repeat(7, 1fr);
      }

      .n-btn {
        width: auto;
      }

      .metrics {
        grid-template-columns: 1fr 1fr;
      }
    }
  </style>
</head>
<body>
  <main>
    <section class="shell">
      <div class="toolbar">
        <div class="tool-group">
          <span class="label">보드 크기</span>
          <div class="n-picker" id="nPicker" aria-label="n 선택"></div>
        </div>

        <div class="tool-group">
          <button class="btn" id="resetQueen">처음</button>
          <button class="btn" id="prevQueen">이전 단계</button>
          <button class="btn primary" id="nextQueen">다음 단계</button>
          <button class="btn" id="autoQueen">자동</button>
          <button class="btn warn" id="allQueen">끝까지</button>
        </div>

        <div class="tool-group">
          <span class="label">현재 n</span>
          <strong id="nValue">4</strong>
        </div>
      </div>

      <div class="stage">
        <div class="board-card">
          <div class="board" id="board" aria-label="n-queen 체스판"></div>
          <div class="legend" aria-label="체스판 색상 설명">
            <div class="legend-item"><span class="swatch green"></span>퀸을 놓은 자리</div>
            <div class="legend-item"><span class="swatch red"></span>퀸을 놓을 수 없는 자리</div>
          </div>
        </div>

        <aside class="side">
          <div class="message" id="queenExplain">첫 번째 행에서 왼쪽 열부터 퀸을 놓을 수 있는지 검사합니다.</div>

          <div class="metrics">
            <div class="metric"><span>현재 행</span><strong id="rowMetric">1</strong></div>
            <div class="metric"><span>시도</span><strong id="tryMetric">0</strong></div>
            <div class="metric"><span>해</span><strong id="solutionMetric">0</strong></div>
            <div class="metric"><span>백트랙</span><strong id="backMetric">0</strong></div>
          </div>

          <div class="array-grid">
            <div class="array-row">
              <div class="array-title"><strong>col</strong><span>같은 열</span></div>
              <div class="chips" id="colArray"></div>
            </div>
            <div class="array-row">
              <div class="array-title"><strong>inc = r + c</strong><span>/ 대각선</span></div>
              <div class="chips" id="incArray"></div>
            </div>
            <div class="array-row">
              <div class="array-title"><strong>dec = n + (r - c) + 1</strong><span>\ 대각선</span></div>
              <div class="chips" id="decArray"></div>
            </div>
          </div>

          <div class="formula" id="formulaBox"></div>
          <div class="diagonal-note">/ 방향은 r+c가 같고, \ 방향은 r-c가 같습니다. r-c에 같은 수 n을 더해도 같은 대각선끼리는 여전히 같은 값이므로, 음수 인덱스만 피하면서 배열에 표시할 수 있습니다.</div>
        </aside>
      </div>
    </section>
  </main>

  <script>
    const state = {
      n: 4,
      steps: [],
      stepIndex: 0,
      auto: null
    };

    function buildQueenSteps(n) {
      const steps = [];
      const board = [];
      const col = Array(n + 1).fill(false);
      const inc = Array(2 * n + 2).fill(false);
      const dec = Array(2 * n + 2).fill(false);
      let tries = 0;
      let backs = 0;
      let answers = 0;

      function snapshot(extra) {
        steps.push(Object.assign({
          board: board.slice(),
          col: col.slice(),
          inc: inc.slice(),
          dec: dec.slice(),
          tries,
          backs,
          answers,
          row: board.length + 1
        }, extra));
      }

      snapshot({ type: 'start', message: '첫 번째 행에서 왼쪽 열부터 검사를 시작합니다.' });

      function solve(row) {
        if (row > n) {
          answers++;
          snapshot({ type: 'solution', row, message: `해 ${answers} 발견: [${board.join(', ')}]` });
          return;
        }

        let placed = false;
        for (let c = 1; c <= n; c++) {
          tries++;
          const incIndex = row + c;
          const decIndex = n + (row - c) + 1;
          const reasons = [];
          if (col[c]) reasons.push(`col[${c}]`);
          if (inc[incIndex]) reasons.push(`inc[${incIndex}]`);
          if (dec[decIndex]) reasons.push(`dec[${decIndex}]`);

          snapshot({
            type: reasons.length ? 'reject' : 'try',
            row,
            colTry: c,
            incIndex,
            decIndex,
            message: reasons.length
              ? `${row}행 ${c}열로 이동했지만 ${reasons.join(', ')}이 이미 체크되어 실패입니다.`
              : `${row}행 ${c}열은 세 배열이 모두 비어 있어 퀸을 놓습니다.`
          });

          if (reasons.length) continue;

          placed = true;
          board.push(c);
          col[c] = inc[incIndex] = dec[decIndex] = true;
          snapshot({
            type: 'place',
            row,
            colTry: c,
            incIndex,
            decIndex,
            message: `체크: col[${c}], inc[${incIndex}], dec[${decIndex}]`
          });

          solve(row + 1);

          board.pop();
          col[c] = inc[incIndex] = dec[decIndex] = false;
          backs++;
          snapshot({
            type: 'backtrack',
            row,
            colTry: c,
            incIndex,
            decIndex,
            ghostQueen: { row, col: c },
            message: `백트래킹: ${row}행 ${c}열의 퀸을 빼고 세 체크 배열의 흔적을 지웁니다.`
          });
        }

        if (!placed) {
          snapshot({ type: 'deadend', row, message: `${row}행에는 놓을 수 있는 열이 없어 이전 행으로 돌아갑니다.` });
        }
      }

      solve(1);
      snapshot({ type: 'done', row: n + 1, message: `전체 탐색 완료: 총 ${answers}개의 해를 찾았습니다.` });
      return steps;
    }

    function renderBoard(step) {
      const board = document.getElementById('board');
      board.style.setProperty('--n', state.n);
      board.innerHTML = '';

      for (let r = 1; r <= state.n; r++) {
        for (let c = 1; c <= state.n; c++) {
          const hasQueen = step.board[r - 1] === c;
          const isGhost = step.ghostQueen && step.ghostQueen.row === r && step.ghostQueen.col === c;
          const cell = document.createElement('div');
          cell.className = `cell ${(r + c) % 2 ? 'dark' : 'light'}`;
          if (hasQueen) cell.classList.add('queen');
          if (isGhost) cell.classList.add('backtracking');
          if (step.row === r && step.colTry === c && step.type === 'try') cell.classList.add('trying');
          if (step.row === r && step.colTry === c && step.type === 'reject') cell.classList.add('reject');
          if (step.type === 'solution' && hasQueen) cell.classList.add('solution');
          cell.innerHTML = `<small>${r},${c}</small>${hasQueen || isGhost ? 'Q' : ''}`;
          board.appendChild(cell);
        }
      }
    }

    function renderArray(target, arr, start, end) {
      const box = document.getElementById(target);
      box.innerHTML = '';
      for (let i = start; i <= end; i++) {
        const chip = document.createElement('span');
        chip.className = `chip ${arr[i] ? 'on' : ''}`;
        chip.textContent = i;
        box.appendChild(chip);
      }
    }

    function renderPicker() {
      const picker = document.getElementById('nPicker');
      picker.innerHTML = '';
      for (let value = 3; value <= 9; value++) {
        const button = document.createElement('button');
        button.type = 'button';
        button.className = `n-btn ${value === state.n ? 'active' : ''}`;
        button.textContent = value;
        button.setAttribute('aria-label', `n을 ${value}로 설정`);
        button.addEventListener('click', () => {
          state.n = value;
          resetQueen();
        });
        picker.appendChild(button);
      }
    }

    function renderQueen() {
      const step = state.steps[state.stepIndex];
      if (!step) return;

      renderBoard(step);
      renderArray('colArray', step.col, 1, state.n);
      renderArray('incArray', step.inc, 2, state.n * 2);
      renderArray('decArray', step.dec, 1, state.n * 2);
      renderPicker();

      document.getElementById('nValue').textContent = state.n;
      document.getElementById('rowMetric').textContent = step.row > state.n ? '-' : step.row;
      document.getElementById('tryMetric').textContent = step.tries;
      document.getElementById('solutionMetric').textContent = step.answers;
      document.getElementById('backMetric').textContent = step.backs;
      document.getElementById('queenExplain').textContent = step.message;
      document.getElementById('formulaBox').innerHTML = step.colTry
        ? `<div>검사 위치: ${step.row}행 ${step.colTry}열</div><div>inc = ${step.row} + ${step.colTry} = ${step.incIndex}</div><div>dec = ${state.n} + (${step.row} - ${step.colTry}) + 1 = ${step.decIndex}</div>`
        : '<div>퀸을 놓을 때마다 세 배열의 인덱스를 계산합니다.</div>';

      document.getElementById('prevQueen').disabled = state.stepIndex === 0;
      document.getElementById('nextQueen').disabled = state.stepIndex >= state.steps.length - 1;
    }

    function resetQueen() {
      stopQueenAuto();
      state.steps = buildQueenSteps(state.n);
      state.stepIndex = 0;
      renderQueen();
    }

    function prevQueen() {
      stopQueenAuto();
      if (state.stepIndex > 0) {
        state.stepIndex--;
        renderQueen();
      }
    }

    function nextQueen() {
      if (state.stepIndex < state.steps.length - 1) {
        state.stepIndex++;
        renderQueen();
      } else {
        stopQueenAuto();
      }
    }

    function stopQueenAuto() {
      if (state.auto) clearInterval(state.auto);
      state.auto = null;
      document.getElementById('autoQueen').textContent = '자동';
    }

    function toggleQueenAuto() {
      if (state.auto) {
        stopQueenAuto();
        return;
      }
      document.getElementById('autoQueen').textContent = '정지';
      state.auto = setInterval(nextQueen, 620);
    }

    document.getElementById('resetQueen').addEventListener('click', resetQueen);
    document.getElementById('prevQueen').addEventListener('click', prevQueen);
    document.getElementById('nextQueen').addEventListener('click', nextQueen);
    document.getElementById('autoQueen').addEventListener('click', toggleQueenAuto);
    document.getElementById('allQueen').addEventListener('click', () => {
      stopQueenAuto();
      state.stepIndex = state.steps.length - 1;
      renderQueen();
    });

    resetQueen();
  </script>
</body>
</html>
